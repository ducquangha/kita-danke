<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Danke, liebe Erzieherinnen ❤️</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: Georgia, 'Times New Roman', serif;
    background: linear-gradient(160deg, #fdf6ee 0%, #fbe8e0 45%, #f6d8cf 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    color: #4a3730;
  }
  .card {
    background: #fffdfa;
    border-radius: 28px;
    box-shadow: 0 18px 50px rgba(120, 70, 50, 0.18);
    padding: 44px 32px;
    max-width: 420px;
    width: 100%;
    text-align: center;
  }
  h1 { font-size: 26px; font-weight: normal; margin-bottom: 8px; }
  p { color: #a08376; font-style: italic; margin-bottom: 28px; }
  a {
    display: block;
    background: linear-gradient(145deg, #f2a29b, #e5837a);
    color: #fff;
    text-decoration: none;
    padding: 16px;
    border-radius: 16px;
    font-size: 18px;
    margin-bottom: 12px;
    box-shadow: 0 6px 16px rgba(229, 131, 122, 0.35);
  }
</style>
</head>
<body>
  <main class="card">
    <h1>Danke, liebe Erzieherinnen ❤️</h1>
    <p>Wähle deine Seite:</p>
    <a href="amelie/">Für Amelie</a>
  </main>
</body>
</html>
